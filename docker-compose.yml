services:
    app:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: links_app
        working_dir: /var/www/html
        volumes:
            - ./:/var/www/html
        depends_on:
            - mysql

    nginx:
        image: nginx:1.27-alpine
        container_name: links_nginx
        ports:
            - "8080:80"
        volumes:
            - ./:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - app

    mysql:
        image: mysql:8.0
        container_name: links_mysql
        ports:
            - "3307:3306"
        environment:
            MYSQL_DATABASE: links
            MYSQL_USER: laravel
            MYSQL_PASSWORD: secret
            MYSQL_ROOT_PASSWORD: root
        volumes:
            - links_mysql_data:/var/lib/mysql

volumes:
    links_mysql_data:
